<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>调试测试页面</title>
<script src="https://fastly.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
.tab{padding:8px 16px;border:1px solid #ccc;cursor:pointer;margin:4px;display:inline-block;}
.tab.active{background:#007acc;color:#fff;}
.chart-panel{display:none;width:100%;height:400px;border:1px solid #ddd;}
.chart-panel.active{display:block;}
</style>
</head>
<body>

<h2>标签切换测试</h2>
<div>
  <div class="tab active" onclick="switchTab(0)">图表1</div>
  <div class="tab" onclick="switchTab(1)">图表2</div>
  <div class="tab" onclick="switchTab(2)">图表3</div>
</div>

<div class="chart-panel active" id="panel-0">
  <div id="chart0" style="width:100%;height:100%;"></div>
</div>
<div class="chart-panel" id="panel-1">
  <div id="chart1" style="width:100%;height:100%;"></div>
</div>
<div class="chart-panel" id="panel-2">
  <div id="chart2" style="width:100%;height:100%;"></div>
</div>

<script>
console.log('Script loading...');
console.log('ECharts available:', typeof echarts !== 'undefined');

// 测试数据
const testData = [
  {day: 1, val1: 10, val2: 8},
  {day: 2, val1: 15, val2: 12},
  {day: 3, val1: 20, val2: 18}
];

let charts = [];

// 初始化图表
function initCharts() {
  console.log('Initializing charts...');

  const days = testData.map(d => d.day);
  const val1 = testData.map(d => d.val1);
  const val2 = testData.map(d => d.val2);

  const c0 = echarts.init(document.getElementById('chart0'));
  c0.setOption({
    title: { text: '图表1' },
    xAxis: { type: 'category', data: days },
    yAxis: { type: 'value' },
    series: [{ data: val1, type: 'line' }]
  });

  const c1 = echarts.init(document.getElementById('chart1'));
  c1.setOption({
    title: { text: '图表2' },
    xAxis: { type: 'category', data: days },
    yAxis: { type: 'value' },
    series: [{ data: val2, type: 'bar' }]
  });

  const c2 = echarts.init(document.getElementById('chart2'));
  c2.setOption({
    title: { text: '图表3' },
    xAxis: { type: 'category', data: days },
    yAxis: { type: 'value' },
    series: [{ data: val1, type: 'line' }, { data: val2, type: 'bar' }]
  });

  charts = [c0, c1, c2];
  console.log('Charts initialized:', charts.length);
}

// 切换标签
function switchTab(i) {
  console.log('Switching to tab:', i);

  const panels = document.querySelectorAll('.chart-panel');
  const tabs = document.querySelectorAll('.tab');

  panels.forEach((p, j) => {
    p.classList.toggle('active', i === j);
    console.log(`Panel ${j} active:`, i === j);
  });

  tabs.forEach((t, j) => {
    t.classList.toggle('active', i === j);
    console.log(`Tab ${j} active:`, i === j);
  });

  if (charts[i]) {
    charts[i].resize();
    console.log(`Chart ${i} resized`);
  } else {
    console.error(`Chart ${i} not found`);
  }
}

// 页面加载后初始化
window.addEventListener('load', function() {
  console.log('Page loaded');
  initCharts();
});

console.log('Script loaded');
</script>
</body>
</html>
